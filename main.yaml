- hosts: all
  become: true
  collections:
    - community.docker
  vars:    
    fail2ban_services:
      - name: sshd
        port: "{{ ansible_port }}"
        maxretry: 3
        bantime: 86400 # 24h in sec

  pre_tasks:
    - name: Update repositories cache
      ansible.builtin.apt:
        update_cache: yes

    - name: Install packages
      apt:
        package:
          - git
          - jq
          - htop
          - zip
          - dnsutils
          - parted
          - cron
          - unzip
          - mc
          - net-tools
          - lm-sensors
        state: present
      tags:
        - install

  tasks:
    - name: set datetime
      timezone:
        name: Europe/Moscow
      tags: timezone

    - name: Configure ufw
      ansible.builtin.import_tasks: tasks/ufw.yaml
      tags: secure, ufw

    - name: Configure fail2ban
      ansible.builtin.import_role:
        name: Oefenweb.fail2ban
      tags: secure, fail2ban

    - name: Configure docker
      ansible.builtin.import_role:
        name: geerlingguy.docker
      tags: docker

    - name: Deploy 3x-ui
      ansible.builtin.import_tasks: tasks/3x-ui.yaml
      when: xui_enabled | default(false)
      tags: 3xui

    - name: Deploy Angie
      ansible.builtin.import_tasks: tasks/angie.yaml
      when: xui_enabled | default(false)
      tags: 3xui

    - name: Deploy telemt (docker)
      ansible.builtin.import_tasks: tasks/telemt.yaml
      when: telemt_enabled | default(false)
      tags: telemt

    - name: Restart Docker service
      ansible.builtin.service:
        name: docker
        state: restarted

  handlers:
    - name: Apply telemt compose
      community.docker.docker_compose_v2:
        project_src: /opt/telemt
        state: present
        recreate: auto

    - name: Restart telemt containers
      community.docker.docker_compose_v2:
        project_src: /opt/telemt
        state: restarted

    - name: Apply 3xui compose
      community.docker.docker_compose_v2:
        project_src: /opt/3xui
        state: present
        recreate: auto

    - name: Apply angie compose
      community.docker.docker_compose_v2:
        project_src: /opt/angie
        state: present
        recreate: auto

    - name: Restart angie containers
      community.docker.docker_compose_v2:
        project_src: /opt/angie
        state: restarted
